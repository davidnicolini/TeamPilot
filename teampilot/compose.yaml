services:
  postgres:
    image: 'postgres:18.4'
    environment:
      POSTGRES_DB: teampilot
      POSTGRES_PASSWORD: root
      POSTGRES_USER: root
    ports:
      - "5432:5432"
    volumes:
      - data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ticketing"]
      interval: 5s
      timeout: 5s
      retries: 3

volumes:
  data: